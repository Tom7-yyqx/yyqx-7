<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连连看 - 20关完整版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f6f7f9;text-align:center;padding:20px}
.home,.game{display:none}
.home.active,.game.active{display:block}
.title{font-size:28px;color:#333;margin:10px 0}
.level-grid{max-width:600px;margin:20px auto;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.level-item{padding:15px 10px;background:#fff;border:2px solid #ddd;border-radius:10px;font-size:18px;cursor:pointer}
.level-unlocked{background:#e3f2fd;border-color:#2196f3;color:#000}
.level-cleared{background:#e8f5e9;border-color:#4caf50}
.level-locked{background:#f5f5f5;color:#999;cursor:not-allowed}
.btn{margin:10px 5px;padding:10px 20px;background:#2196f3;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.btn-red{background:#f44336}
.btn-orange{background:#ff9800}
.game-info{margin:10px 0;font-size:16px}
.time{font-size:18px;font-weight:bold;color:#f44336;margin:10px 0}
#game{display:inline-block;background:#fff;border:3px solid #d1d8e0;border-radius:10px;padding:10px}
.row{display:flex;justify-content:center}
.item{width:46px;height:46px;margin:2px;background:#e9ecef;border:2px solid #adb5bd;border-radius:6px;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.item.selected{background:#ffc107;border-color:#fd7e14}
.item.hidden{visibility:hidden;pointer-events:none}
.msg{font-size:22px;font-weight:bold;margin:15px 0}
.win{color:#4caf50}
.lose{color:#f44336}
.pause{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);color:white;display:none;align-items:center;justify-content:center;font-size:30px;font-weight:bold}
.pause.show{display:flex}
</style>
</head>
<body>

<!-- 主页 -->
<div class="home active" id="home">
<div class="title">连连看 - 20关完整版</div>
<div class="level-grid" id="levelGrid"></div>
</div>

<!-- 游戏页 -->
<div class="game" id="gamePage">
<div class="title">连连看</div>
<div class="game-info">关卡：<span id="curLevel">1</span></div>
<div class="time">剩余时间：<span id="timeLeft">0</span> 秒</div>
<div id="game"></div>
<br>
<button class="btn" onclick="backHome()">返回主页</button>
<button class="btn btn-orange" onclick="togglePause()">暂停 / 继续</button>
<button class="btn" onclick="restartCurrent()">重新开始</button>
<div class="msg" id="msg"></div>
</div>

<!-- 暂停遮罩 -->
<div class="pause" id="pauseLayer">游戏已暂停</div>

<script>
// ====================== 20关配置 ======================
const levels = []
for(let i=1;i<=20;i++){
    let icons = 6 + Math.floor(i*0.8)
    if(icons>18) icons=18
    let time = 65 - i*2
    if(time<20) time=20
    let row = 4 + Math.floor(i/6)
    let col = 3 + Math.floor(i/5)
    if(row>7) row=7
    if(col>7) col=7
    levels.push({icons,time,row,col})
}

const allIcons = ['🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍒','🍑','🥭','🍍','🍈','🍇','🥝','🍆','🥑']

let unlockLevel = 1   // 已解锁关卡
let clearLevels = [] // 已通关
let playingLevel = 0
let data = []
let selected = null
let doms = []
let timer = null
let timeLeft = 0
let paused = false

// ====================== 主页 ======================
function renderHome(){
    const g = document.getElementById('levelGrid')
    g.innerHTML = ''
    for(let i=0;i<20;i++){
        const div = document.createElement('div')
        div.className = 'level-item'
        if(i+1 > unlockLevel){
            div.classList.add('level-locked')
            div.innerText = `${i+1}\n未解锁`
        }else if(clearLevels.includes(i+1)){
            div.classList.add('level-cleared')
            div.innerText = `${i+1}\n已通关`
        }else{
            div.classList.add('level-unlocked')
            div.innerText = `${i+1}\n开始`
        }
        div.onclick = () => {
            if(i+1 <= unlockLevel) startLevel(i)
        }
        g.appendChild(div)
    }
}

// ====================== 进入关卡 ======================
function startLevel(idx){
    playingLevel = idx
    document.querySelector('.home').classList.remove('active')
    document.querySelector('.game').classList.add('active')
    paused = false
    document.getElementById('pauseLayer').classList.remove('show')
    goLevel()
}

function goLevel(){
    clearInterval(timer)
    const lev = levels[playingLevel]
    data = []
    doms = []
    selected = null
    document.getElementById('msg').innerText = ''
    document.getElementById('curLevel').innerText = playingLevel+1

    let use = allIcons.slice(0,lev.icons)
    let temp = [...use,...use]
    temp.sort(()=>Math.random()-0.5)

    const total = lev.row * lev.col
    for(let i=0;i<total;i++) data.push(temp[i]||'')

    timeLeft = lev.time
    renderGame()
    startTimer()
}

function renderGame(){
    const box = document.getElementById('game')
    box.innerHTML = ''
    const lev = levels[playingLevel]
    for(let r=0;r<lev.row;r++){
        const row = document.createElement('div')
        row.className='row'
        for(let c=0;c<lev.col;c++){
            const idx = r*lev.col + c
            const it = document.createElement('div')
            it.className='item'
            it.innerText = data[idx]
            it.onclick = ()=>click(idx)
            row.appendChild(it)
            doms.push(it)
        }
        box.appendChild(row)
    }
    document.getElementById('timeLeft').innerText = timeLeft
}

// ====================== 游戏逻辑 ======================
function click(idx){
    if(paused || data[idx]==='') return
    const el = doms[idx]
    if(selected===null){
        selected=idx
        el.classList.add('selected')
    }else{
        doms[selected].classList.remove('selected')
        if(selected!==idx && data[selected]===data[idx]){
            data[selected]=''
            data[idx]=''
            doms[selected].classList.add('hidden')
            doms[idx].classList.add('hidden')
        }
        selected=null
        checkWin()
    }
}

function startTimer(){
    clearInterval(timer)
    timer = setInterval(()=>{
        if(paused) return
        timeLeft--
        document.getElementById('timeLeft').innerText=timeLeft
        if(timeLeft<=0){
            clearInterval(timer)
            showMsg('时间到！挑战失败','lose')
        }
    },1000)
}

function checkWin(){
    const ok = data.every(x=>x==='')
    if(ok){
        clearInterval(timer)
        if(!clearLevels.includes(playingLevel+1)) clearLevels.push(playingLevel+1)
        if(playingLevel+1 >= unlockLevel) unlockLevel = playingLevel+2
        if(playingLevel<19){
            showMsg('🎉 通关成功！','win')
            setTimeout(()=>{backHome()},1500)
        }else{
            showMsg('🏆 恭喜通关全部20关！','win')
        }
    }
}

// ====================== 控制 ======================
function togglePause(){
    paused = !paused
    const layer = document.getElementById('pauseLayer')
    paused ? layer.classList.add('show') : layer.classList.remove('show')
}

function restartCurrent(){goLevel()}
function backHome(){
    clearInterval(timer)
    document.querySelector('.game').classList.remove('active')
    document.querySelector('.home').classList.add('active')
    renderHome()
}

function showMsg(t,cls){
    const m=document.getElementById('msg')
    m.innerText=t
    m.className='msg '+cls
}

// 初始化
renderHome()
</script>
</body>
</html>
